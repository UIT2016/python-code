# 手工审计规则（优先级最高）
# 修改后请在 Web 页点击「刷新审计规则」使 Agent3 重新生成 active_rubric.json

must:
  - 必须保留「超景气价值投机/超景气价值投资」相关框架术语（若原文出现）
  - 必须保留定性分析逻辑链，不能只留结论
  - 个股/板块案例必须附带原文 evidence_quotes

must_not:
  - 不得添加原文未提及的股票代码或具体价位
  - 不得将 UP 主口播玩笑话当作投资建议
  - 不得保留「求三连」「关注 UP 主」类内容

locked_rules:
  - pass_threshold 不得低于 80
  - fidelity 维度权重不得低于 20
